<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qrflow · QR码重建工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>qrflow</h1>
            <p class="subtitle">上传破损或模糊的QR码，自动增强识别并重建高清版本</p>
        </header>

        <!-- Upload Zone -->
        <section class="upload-section">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="upload-text">拖拽图片到此处，或 <span class="upload-link">点击选择文件</span></p>
                    <p class="upload-hint">支持 PNG、JPG、BMP、GIF、WebP、TIFF 格式</p>
                    <p class="paste-hint">也可以直接 Ctrl+V 粘贴剪贴板中的图片</p>
                </div>
                <input type="file" id="fileInput" accept="image/png,image/jpeg,image/bmp,image/gif,image/webp,image/tiff" hidden>
            </div>

            <!-- Preview of uploaded image -->
            <div class="preview-area hidden" id="previewArea">
                <div class="preview-wrapper" id="previewWrapper">
                    <img id="previewImage" alt="预览图片" class="preview-image">
                    <div class="crop-overlay hidden" id="cropOverlay"></div>
                </div>
                <div class="crop-hint hidden" id="cropHint">
                    未自动检测到QR码，您可以手动框选QR区域重新处理
                </div>
                <div class="preview-actions">
                    <button class="btn btn-secondary" id="btnChangeFile">更换图片</button>
                    <button class="btn btn-secondary hidden" id="btnStartCrop">手动框选QR区域</button>
                    <button class="btn btn-primary hidden" id="btnManualProcess">使用框选区域处理</button>
                    <button class="btn btn-secondary hidden" id="btnCancelCrop">取消框选</button>
                </div>
            </div>
        </section>

        <!-- Progress Section -->
        <section class="progress-section hidden" id="progressSection">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">正在处理...</p>
            </div>
        </section>

        <!-- Error Section -->
        <section class="error-section hidden" id="errorSection">
            <div class="error-card" id="errorMessage"></div>
        </section>

        <!-- Results Section -->
        <section class="results-section hidden" id="resultsSection">
            <h2>处理结果 <span class="result-count" id="resultCount"></span></h2>
            <div class="results-grid" id="resultsGrid"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p><a href="https://github.com/jianjunwu/qrflow" target="_blank">QRFlow</a> — QR码增强识别与重建工具</p>
        </footer>
    </div>

    <script>
    (function() {
        // --- DOM references ---
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const btnChangeFile = document.getElementById('btnChangeFile');
        const cropHint = document.getElementById('cropHint');
        const btnStartCrop = document.getElementById('btnStartCrop');
        const btnManualProcess = document.getElementById('btnManualProcess');
        const btnCancelCrop = document.getElementById('btnCancelCrop');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const errorSection = document.getElementById('errorSection');
        const errorMessage = document.getElementById('errorMessage');
        const resultsSection = document.getElementById('resultsSection');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultCount = document.getElementById('resultCount');
        const previewWrapper = document.getElementById('previewWrapper');
        const cropOverlay = document.getElementById('cropOverlay');

        let uploadedFilename = null;
        let processing = false;
        let abortController = null;
        let progressTimer = null;
        let qrRegions = [];

        const PROGRESS_MESSAGES = [
            '正在分析图像特征...',
            '正在增强图像质量...',
            '正在识别QR码内容...',
            '正在重建高清版本...',
        ];

        // --- Paste from clipboard ---
        document.addEventListener('paste', (e) => {
            if (processing) return;
            const items = e.clipboardData.items;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    handleFile(file);
                    return;
                }
            }
        });

        // --- Upload handling ---
        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        btnChangeFile.addEventListener('click', () => {
            if (processing) {
                abortProcessing();
            }
            resetAll();
        });

        // --- File upload (auto-process) ---
        async function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请选择图片文件');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);

            try {
                const resp = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await resp.json();
                if (!data.success) {
                    showError(data.error || '上传失败，请重试');
                    return;
                }

                uploadedFilename = data.filename;
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewArea.classList.remove('hidden');
                    uploadZone.classList.add('hidden');
                };
                reader.readAsDataURL(file);
                clearError();

                // Detect regions then auto-process
                await detectRegions(data.filename);
                startProcessing();
            } catch (err) {
                showError('上传失败，请检查网络连接后重试');
            }
        }

        async function detectRegions(filename) {
            try {
                const resp = await fetch('/api/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename }),
                });
                const data = await resp.json();
                if (data.success && data.qr_regions && data.qr_regions.length > 0) {
                    qrRegions = data.qr_regions;
                } else {
                    qrRegions = [];
                }
            } catch (err) {
                qrRegions = [];
            }
        }

        function resetAll() {
            uploadedFilename = null;
            qrRegions = [];
            previewArea.classList.add('hidden');
            uploadZone.classList.remove('hidden');
            fileInput.value = '';
            progressSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            clearError();
            cancelCropMode();
        }

        // --- Progress ---
        function startProgress() {
            progressSection.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            progressFill.className = 'progress-fill active';
            progressText.textContent = PROGRESS_MESSAGES[0];

            let idx = 0;
            progressTimer = setInterval(() => {
                idx = (idx + 1) % PROGRESS_MESSAGES.length;
                progressText.textContent = PROGRESS_MESSAGES[idx];
            }, 2500);
        }

        function finishProgress(success) {
            clearInterval(progressTimer);
            progressTimer = null;
            progressFill.className = success ? 'progress-fill done' : 'progress-fill error';
            progressText.textContent = success ? '处理完成' : '未能识别到QR码';
        }

        // --- Processing ---
        async function startProcessing() {
            if (!uploadedFilename) return;

            processing = true;
            abortController = new AbortController();
            btnChangeFile.textContent = '取消处理';
            startProgress();

            // Hide crop UI during processing
            cancelCropMode();
            cropHint.classList.add('hidden');

            try {
                const resp = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: uploadedFilename }),
                    signal: abortController.signal,
                });
                const data = await resp.json();

                if (!data.success) {
                    finishProgress(false);
                    showError(data.error || '未能识别到QR码内容');
                    return;
                }

                // Save regions from response if available
                if (data.qr_regions && data.qr_regions.length > 0) {
                    qrRegions = data.qr_regions;
                }

                finishProgress(true);
                renderResults(data);

            } catch (err) {
                if (err.name === 'AbortError') return;
                finishProgress(false);
                showError('处理失败，请检查网络连接后重试');
            } finally {
                processing = false;
                abortController = null;
                btnChangeFile.textContent = '更换图片';
            }
        }

        function abortProcessing() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            clearInterval(progressTimer);
            progressTimer = null;
            processing = false;
            progressSection.classList.add('hidden');
            btnChangeFile.textContent = '更换图片';
        }

        // --- Results rendering ---
        function renderResults(data) {
            const dedup = data.deduplicated || [];
            resultsSection.classList.remove('hidden');
            resultCount.textContent = `（共 ${dedup.length} 条）`;
            resultsGrid.innerHTML = '';

            if (dedup.length === 0) {
                resultsGrid.innerHTML = `
                    <div class="no-results">
                        <p>未能识别到QR码内容</p>
                        <p>请尝试使用更清晰的图片，或手动框选QR码区域</p>
                        <button class="btn btn-secondary" id="btnRetryCrop">手动框选QR区域</button>
                    </div>
                `;
                document.getElementById('btnRetryCrop').addEventListener('click', () => {
                    resultsSection.classList.add('hidden');
                    cropHint.classList.remove('hidden');
                    btnStartCrop.classList.remove('hidden');
                    startCropMode();
                });
                return;
            }

            const hasRegions = qrRegions.length > 0;

            dedup.forEach((entry, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';

                let detailsHTML = '';
                if (hasRegions) {
                    detailsHTML = `
                        <details class="card-details">
                            <summary>查看原图与检测区域</summary>
                            <div class="details-images">
                                <div class="detail-thumb">
                                    <img src="${data.original_image_base64}" alt="原图">
                                    <span>原图</span>
                                </div>
                                <div class="detail-thumb">
                                    <img src="${qrRegions[0].crop_base64}" alt="检测区域">
                                    <span>检测到的QR区域</span>
                                </div>
                            </div>
                        </details>`;
                } else {
                    detailsHTML = `
                        <details class="card-details">
                            <summary>查看原图</summary>
                            <div class="details-images">
                                <div class="detail-thumb">
                                    <img src="${data.original_image_base64}" alt="原图">
                                    <span>原图</span>
                                </div>
                            </div>
                        </details>`;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-number">#${idx + 1}</span>
                        <span class="card-status success">已识别</span>
                    </div>
                    <div class="card-body">
                        <div class="card-hero">
                            <img src="${entry.reconstructed_qr_base64}" alt="重建QR码" class="hero-qr">
                            <span class="hero-label">重建QR码 — 可直接扫描使用</span>
                        </div>
                        <div class="card-content-section">
                            <label class="card-label">解码内容</label>
                            <textarea readonly class="content-textarea" rows="2">${escapeHtml(entry.content)}</textarea>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-copy" data-content="${escapeHtml(entry.content)}">复制内容</button>
                            <button class="btn btn-download" data-qr="${entry.reconstructed_qr_base64}">下载QR码</button>
                        </div>
                        ${detailsHTML}
                    </div>
                `;

                resultsGrid.appendChild(card);
            });

            // Bind copy buttons
            resultsGrid.querySelectorAll('.btn-copy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const content = btn.getAttribute('data-content');
                    navigator.clipboard.writeText(content).then(() => {
                        const original = btn.textContent;
                        btn.textContent = '已复制';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.textContent = original;
                            btn.classList.remove('copied');
                        }, 2000);
                    }).catch(() => {
                        alert('复制失败，请手动复制');
                    });
                });
            });

            // Bind download buttons
            resultsGrid.querySelectorAll('.btn-download').forEach(btn => {
                btn.addEventListener('click', () => {
                    const qrDataUri = btn.getAttribute('data-qr');
                    const link = document.createElement('a');
                    link.href = qrDataUri;
                    link.download = `qr-code-${Date.now()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
            });
        }

        // --- Utilities ---
        function showError(msg) {
            errorSection.classList.remove('hidden');
            errorMessage.textContent = msg;
        }

        function clearError() {
            errorSection.classList.add('hidden');
            errorMessage.textContent = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // --- Manual crop selection ---
        function startCropMode() {
            if (!uploadedFilename) return;
            cropState.active = true;
            cropState.drawing = false;
            cropState.origX = cropState.origY = cropState.origW = cropState.origH = 0;

            btnStartCrop.classList.add('hidden');
            btnManualProcess.classList.add('hidden');
            btnCancelCrop.classList.remove('hidden');
            cropOverlay.classList.add('hidden');
            previewImage.style.cursor = 'crosshair';

            previewWrapper.addEventListener('mousedown', onCropMouseDown);
        }

        function cancelCropMode() {
            cropState.active = false;
            cropState.drawing = false;
            cropState.origX = cropState.origY = cropState.origW = cropState.origH = 0;

            btnStartCrop.classList.add('hidden');
            btnManualProcess.classList.add('hidden');
            btnCancelCrop.classList.add('hidden');
            cropHint.classList.add('hidden');
            cropOverlay.classList.add('hidden');
            previewImage.style.cursor = '';
            previewWrapper.removeEventListener('mousedown', onCropMouseDown);
            document.removeEventListener('mousemove', onCropMouseMove);
            document.removeEventListener('mouseup', onCropMouseUp);
        }

        // --- Crop state ---
        let cropState = {
            active: false,
            drawing: false,
            startX: 0, startY: 0,
            endX: 0, endY: 0,
            origX: 0, origY: 0, origW: 0, origH: 0,
        };

        function onCropMouseDown(e) {
            if (!cropState.active) return;
            e.preventDefault();
            cropState.drawing = true;

            const rect = previewImage.getBoundingClientRect();
            cropState.startX = e.clientX - rect.left;
            cropState.startY = e.clientY - rect.top;
            cropState.endX = cropState.startX;
            cropState.endY = cropState.startY;

            updateCropOverlay();
            document.addEventListener('mousemove', onCropMouseMove);
            document.addEventListener('mouseup', onCropMouseUp);
        }

        function onCropMouseMove(e) {
            if (!cropState.drawing) return;
            const rect = previewImage.getBoundingClientRect();
            cropState.endX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            cropState.endY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
            updateCropOverlay();
        }

        function onCropMouseUp(e) {
            if (!cropState.drawing) return;
            cropState.drawing = false;
            document.removeEventListener('mousemove', onCropMouseMove);
            document.removeEventListener('mouseup', onCropMouseUp);

            const rect = previewImage.getBoundingClientRect();
            cropState.endX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            cropState.endY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

            const bx = Math.min(cropState.startX, cropState.endX);
            const by = Math.min(cropState.startY, cropState.endY);
            const bw = Math.abs(cropState.endX - cropState.startX);
            const bh = Math.abs(cropState.endY - cropState.startY);

            const scaleX = previewImage.naturalWidth / rect.width;
            const scaleY = previewImage.naturalHeight / rect.height;

            cropState.startX = bx;
            cropState.startY = by;
            cropState.endX = bx + bw;
            cropState.endY = by + bh;
            cropState.origX = Math.round(bx * scaleX);
            cropState.origY = Math.round(by * scaleY);
            cropState.origW = Math.round(bw * scaleX);
            cropState.origH = Math.round(bh * scaleY);

            updateCropOverlay();

            if (cropState.origW > 5 && cropState.origH > 5) {
                btnManualProcess.classList.remove('hidden');
            }
        }

        function updateCropOverlay() {
            const bx = Math.min(cropState.startX, cropState.endX);
            const by = Math.min(cropState.startY, cropState.endY);
            const bw = Math.abs(cropState.endX - cropState.startX);
            const bh = Math.abs(cropState.endY - cropState.startY);

            const imgLeft = previewImage.offsetLeft;
            const imgTop = previewImage.offsetTop;

            cropOverlay.style.left = (imgLeft + bx) + 'px';
            cropOverlay.style.top = (imgTop + by) + 'px';
            cropOverlay.style.width = bw + 'px';
            cropOverlay.style.height = bh + 'px';
            cropOverlay.classList.toggle('hidden', bw < 2 || bh < 2);
        }

        // --- Button handlers ---
        btnStartCrop.addEventListener('click', startCropMode);
        btnCancelCrop.addEventListener('click', cancelCropMode);

        btnManualProcess.addEventListener('click', function() {
            if (!uploadedFilename || cropState.origW <= 0 || cropState.origH <= 0) return;
            processManualCrop();
        });

        async function processManualCrop() {
            processing = true;
            btnManualProcess.disabled = true;
            btnCancelCrop.disabled = true;
            btnChangeFile.textContent = '取消处理';
            abortController = new AbortController();

            errorSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            cancelCropMode();
            cropHint.classList.add('hidden');
            startProgress();

            try {
                const resp = await fetch('/api/manual_crop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: uploadedFilename,
                        x: cropState.origX,
                        y: cropState.origY,
                        width: cropState.origW,
                        height: cropState.origH,
                    }),
                    signal: abortController.signal,
                });
                const data = await resp.json();

                if (!data.success) {
                    finishProgress(false);
                    showError(data.error || '未能识别到QR码内容');
                    return;
                }

                if (data.qr_regions && data.qr_regions.length > 0) {
                    qrRegions = data.qr_regions;
                }

                finishProgress(true);
                renderResults(data);

            } catch (err) {
                if (err.name === 'AbortError') return;
                finishProgress(false);
                showError('处理失败，请检查网络连接后重试');
            } finally {
                processing = false;
                abortController = null;
                btnManualProcess.disabled = false;
                btnCancelCrop.disabled = false;
                btnChangeFile.textContent = '更换图片';
            }
        }
    })();
    </script>
</body>
</html>
