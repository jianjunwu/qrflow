<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qrflow · 图片丢进来，高清 QR 码拿出去</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>qrflow</h1>
            <p class="subtitle">图片丢进来，高清 QR 码拿出去</p>
        </header>

        <!-- Upload Zone (shown when no files or user returns to upload) -->
        <section class="upload-section" id="uploadSection">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="upload-text">拖拽图片到此处，或 <span class="upload-link">点击选择文件</span></p>
                    <p class="upload-hint">支持 PNG、JPG、BMP、GIF、WebP、TIFF 格式，可多选</p>
                    <p class="paste-hint">也可以直接 Ctrl+V 粘贴剪贴板中的图片</p>
                </div>
                <input type="file" id="fileInput" accept="image/png,image/jpeg,image/bmp,image/gif,image/webp,image/tiff" multiple hidden>
            </div>
        </section>

        <!-- Thumbnail Strip (shown when files exist) -->
        <section class="thumbnail-strip hidden" id="thumbnailStrip">
            <div class="thumbnails-scroll" id="thumbnailsScroll"></div>
            <button class="btn btn-thumb-add" id="btnThumbAdd" title="添加图片">+</button>
            <button class="btn-clear-all" id="btnClearAll">清空全部</button>
        </section>

        <!-- Main Content (two-column during processing) -->
        <div class="main-content" id="mainContent">
            <!-- Preview Area -->
            <section class="preview-section hidden" id="previewSection">
                <div class="preview-wrapper" id="previewWrapper">
                    <img id="previewImage" alt="预览图片" class="preview-image">
                    <div class="crop-overlays-container" id="cropOverlays"></div>
                </div>
                <div class="crop-hint hidden" id="cropHint">
                    未自动检测到QR码，您可以手动框选QR区域后重新处理
                </div>

                <!-- Compact Progress -->
                <div class="progress-inline hidden" id="progressInline">
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-text" id="progressText"></span>
                </div>
                <div class="step-list hidden" id="stepList"></div>

                <div class="preview-actions">
                    <button class="btn btn-secondary" id="btnReturnUpload">返回上传</button>
                    <button class="btn btn-secondary" id="btnChangeFile">更换图片</button>
                    <button class="btn btn-secondary hidden" id="btnStartCrop">手动框选QR区域</button>
                    <button class="btn btn-primary" id="btnProcess">开始处理</button>
                    <button class="btn btn-process-all hidden" id="btnProcessAll" title="处理全部已上传的图片">处理全部</button>
                    <button class="btn btn-primary hidden" id="btnManualProcess">处理选中区域</button>
                    <button class="btn btn-success hidden" id="btnConfirmCrop">确认框选</button>
                    <button class="btn btn-secondary hidden" id="btnCancelCrop">取消框选</button>
                </div>
            </section>
        </div>

        <!-- Error Section -->
        <section class="error-section hidden" id="errorSection">
            <div class="error-card" id="errorMessage"></div>
        </section>

        <!-- Results Section -->
        <section class="results-section hidden" id="resultsSection">
            <h2 id="resultsTitle">处理结果</h2>
            <div class="results-layout">
                <div class="results-sidebar" id="resultsSidebar"></div>
                <div class="results-main" id="resultsGroups"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p><a href="https://github.com/jianjunwu/qrflow" target="_blank">QRFlow</a> — 图片丢进来，高清 QR 码拿出去</p>
        </footer>
    </div>

    <!-- QR Lightbox -->
    <div class="lightbox hidden" id="qrLightbox">
        <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
        <div class="lightbox-content" id="lightboxContent">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <img id="lightboxImage" alt="QR码大图">
            <div class="lightbox-info" id="lightboxInfo"></div>
        </div>
    </div>

    <script>
    (function() {
        // ============================================================
        // DOM references
        // ============================================================
        const uploadSection = document.getElementById('uploadSection');
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const thumbnailStrip = document.getElementById('thumbnailStrip');
        const thumbnailsScroll = document.getElementById('thumbnailsScroll');
        const btnThumbAdd = document.getElementById('btnThumbAdd');
        const btnClearAll = document.getElementById('btnClearAll');
        const mainContent = document.getElementById('mainContent');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const previewWrapper = document.getElementById('previewWrapper');
        const cropOverlays = document.getElementById('cropOverlays');
        const cropHint = document.getElementById('cropHint');
        const btnReturnUpload = document.getElementById('btnReturnUpload');
        const btnChangeFile = document.getElementById('btnChangeFile');
        const btnStartCrop = document.getElementById('btnStartCrop');
        const btnProcess = document.getElementById('btnProcess');
        const btnProcessAll = document.getElementById('btnProcessAll');
        const btnManualProcess = document.getElementById('btnManualProcess');
        const btnConfirmCrop = document.getElementById('btnConfirmCrop');
        const btnCancelCrop = document.getElementById('btnCancelCrop');
        const progressInline = document.getElementById('progressInline');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const stepList = document.getElementById('stepList');
        const errorSection = document.getElementById('errorSection');
        const errorMessage = document.getElementById('errorMessage');
        const resultsSection = document.getElementById('resultsSection');
        const resultsTitle = document.getElementById('resultsTitle');
        const resultsSidebar = document.getElementById('resultsSidebar');
        const resultsGroups = document.getElementById('resultsGroups');
        const qrLightbox = document.getElementById('qrLightbox');
        const lightboxBackdrop = document.getElementById('lightboxBackdrop');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxContent = document.getElementById('lightboxContent');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxInfo = document.getElementById('lightboxInfo');

        // ============================================================
        // State
        // ============================================================
        const uploadedFiles = new Map();   // id -> file record
        let activeFileId = null;
        let activeResultTabId = null;
        let processing = false;
        let abortController = null;
        let progressTimer = null;
        let fileIdCounter = 0;

        const PROGRESS_MESSAGES = [
            '正在分析图像特征...',
            '正在增强图像质量...',
            '正在识别QR码内容...',
            '正在重建高清版本...',
        ];

        // ============================================================
        // Crop state
        // ============================================================
        let cropState = {
            active: false,
            drawing: false,
            dragging: false,
            resizing: false,
            resizeHandle: null,
            selectedIndex: -1,
            rects: [],
            startX: 0, startY: 0,
            endX: 0, endY: 0,
            dragOffX: 0, dragOffY: 0,
        };

        // ============================================================
        // Helpers
        // ============================================================
        function getActiveFile() {
            return activeFileId ? uploadedFiles.get(activeFileId) : null;
        }

        function getActiveResults() {
            const f = getActiveFile();
            return f ? f.results : null;
        }

        // ============================================================
        // Upload handling
        // ============================================================
        uploadZone.addEventListener('click', () => fileInput.click());
        btnThumbAdd.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFiles(fileInput.files);
                fileInput.value = '';
            }
        });

        // Paste
        document.addEventListener('paste', (e) => {
            if (processing) return;
            const files = [];
            for (const item of e.clipboardData.items) {
                if (item.type.startsWith('image/')) {
                    files.push(item.getAsFile());
                }
            }
            if (files.length > 0) {
                e.preventDefault();
                handleFiles(files);
            }
        });

        btnClearAll.addEventListener('click', () => {
            uploadedFiles.clear();
            activeFileId = null;
            activeResultTabId = null;
            cropState.rects = [];
            clearAllCropOverlays();
            updateUI();
        });

        async function handleFiles(files) {
            const fileList = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (fileList.length === 0) {
                showError('请选择图片文件');
                return;
            }
            clearError();

            // Phase 1: Read all dataURIs in parallel, build records
            const records = await Promise.all(
                fileList.map(async (file) => {
                    const id = 'f' + (++fileIdCounter);
                    const dataUri = await readFileAsDataUri(file);
                    return {
                        id,
                        filename: null,
                        originalName: file.name,
                        dataUri,
                        regions: [],
                        results: null,
                        processed: false,
                        status: 'uploading',
                        _file: file,
                    };
                })
            );

            for (const rec of records) {
                const { _file, ...record } = rec;
                uploadedFiles.set(rec.id, record);
            }
            if (!activeFileId || !uploadedFiles.has(activeFileId)) {
                activeFileId = uploadedFiles.keys().next().value;
            }
            updateUI();

            // Phase 2: Upload + detect all in parallel
            await Promise.allSettled(
                records.map(async (rec) => {
                    const record = uploadedFiles.get(rec.id);
                    if (!record) return;
                    try {
                        const formData = new FormData();
                        formData.append('file', rec._file);
                        const resp = await fetch('/api/upload', { method: 'POST', body: formData });
                        const data = await resp.json();
                        if (data.success) {
                            record.filename = data.filename;
                            record.status = 'detecting';
                            updateUI();
                            await detectRegionsForFile(record);
                            record.status = 'ready';
                        } else {
                            record.status = 'error';
                        }
                    } catch (err) {
                        record.status = 'error';
                    }
                    updateUI();
                })
            );
        }

        function readFileAsDataUri(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function detectRegionsForFile(record) {
            if (!record.filename) return;
            try {
                const resp = await fetch('/api/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: record.filename }),
                });
                const data = await resp.json();
                if (data.success && data.qr_regions && data.qr_regions.length > 0) {
                    record.regions = data.qr_regions;
                } else {
                    record.regions = [];
                }
            } catch (err) {
                record.regions = [];
            }
        }

        // ============================================================
        // File selection / removal
        // ============================================================
        function removeFile(id) {
            uploadedFiles.delete(id);
            if (activeFileId === id) {
                activeFileId = uploadedFiles.keys().next().value || null;
                cropState.rects = [];
                clearAllCropOverlays();
            }
            updateUI();
        }

        function selectFile(id) {
            if (processing) return;
            activeFileId = id;
            cancelCropMode();
            clearError();
            updateUI();
        }

        btnReturnUpload.addEventListener('click', () => {
            activeFileId = null;
            updateUI();
        });

        btnChangeFile.addEventListener('click', () => {
            if (processing) {
                abortProcessing();
            }
            const oldId = activeFileId;
            fileInput.click();
            // After new file selected, remove old one
            const origChange = fileInput.onchange;
            fileInput.onchange = () => {
                if (oldId) uploadedFiles.delete(oldId);
                if (fileInput.files.length > 0) {
                    handleFiles(fileInput.files);
                } else if (!uploadedFiles.size) {
                    activeFileId = null;
                    updateUI();
                }
                fileInput.value = '';
                fileInput.onchange = origChange;
            };
        });

        // ============================================================
        // UI update
        // ============================================================
        function updateUI() {
            renderThumbnails();

            const hasFiles = uploadedFiles.size > 0;
            const activeFile = getActiveFile();

            uploadSection.classList.toggle('hidden', hasFiles && activeFileId !== null);
            thumbnailStrip.classList.toggle('hidden', !hasFiles);
            previewSection.classList.toggle('hidden', !activeFile);
            mainContent.classList.toggle('has-preview', !!activeFile);

            if (activeFile) {
                previewImage.src = activeFile.dataUri;
                const hasRegions = activeFile.regions && activeFile.regions.length > 0;
                cropHint.classList.toggle('hidden', hasRegions);
                btnStartCrop.classList.toggle('hidden', cropState.active);

                if (activeFile.processed && activeFile.results) {
                    renderAllResults();
                }
            }

            // Show "process all" when multiple files have pending work
            if (!processing) {
                let pendingCount = 0;
                uploadedFiles.forEach((r) => { if (r.filename && !r.processed) pendingCount++; });
                btnProcessAll.classList.toggle('hidden', pendingCount <= 1);
            }

            if (!hasFiles) {
                activeFileId = null;
                uploadSection.classList.remove('hidden');
                thumbnailStrip.classList.add('hidden');
                previewSection.classList.add('hidden');
                progressInline.classList.add('hidden');
                stepList.classList.add('hidden');
                resultsSection.classList.add('hidden');
                mainContent.classList.remove('has-preview');
            }
        }

        function renderThumbnails() {
            thumbnailsScroll.innerHTML = '';
            uploadedFiles.forEach((record, id) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb-item' + (id === activeFileId ? ' active' : '');
                if (record.processed && record.results) {
                    const dedup = record.results.deduplicated || [];
                    thumb.classList.add(dedup.length > 0 ? 'status-ok' : 'status-empty');
                } else if (record.status === 'uploading' || record.status === 'detecting') {
                    thumb.classList.add('status-uploading');
                } else if (record.status === 'error') {
                    thumb.classList.add('status-error');
                }
                let statusOverlay = '';
                if (record.status === 'uploading' || record.status === 'detecting') {
                    statusOverlay = '<div class="thumb-status"><div class="thumb-spinner"></div></div>';
                } else if (record.status === 'error') {
                    statusOverlay = '<div class="thumb-status error"><span class="thumb-error-icon">!</span></div>';
                }
                thumb.innerHTML = `
                    <img src="${record.dataUri}" alt="${record.originalName}">
                    ${statusOverlay}
                    <span class="thumb-name">${record.originalName}</span>
                    <button class="thumb-remove" title="删除">&times;</button>
                `;
                thumb.querySelector('img').addEventListener('click', () => selectFile(id));
                thumb.querySelector('.thumb-remove').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFile(id);
                });
                thumbnailsScroll.appendChild(thumb);
            });
        }

        // ============================================================
        // Processing
        // ============================================================
        btnProcess.addEventListener('click', () => {
            if (processing) {
                abortProcessing();
            } else {
                startProcessing();
            }
        });

        btnProcessAll.addEventListener('click', () => {
            if (processing) {
                abortProcessing();
            } else {
                startProcessingAll();
            }
        });

        function startProgress() {
            progressInline.classList.remove('hidden');
            stepList.classList.add('hidden');
            stepList.innerHTML = '';
            progressFill.className = 'progress-fill active';
            progressText.textContent = PROGRESS_MESSAGES[0];

            let idx = 0;
            progressTimer = setInterval(() => {
                idx = (idx + 1) % PROGRESS_MESSAGES.length;
                progressText.textContent = PROGRESS_MESSAGES[idx];
            }, 2500);
        }

        function finishProgress(success, message) {
            clearInterval(progressTimer);
            progressTimer = null;
            progressFill.className = success ? 'progress-fill done' : 'progress-fill error';
            progressText.textContent = message || (success ? '处理完成' : '未能识别到QR码');
            setTimeout(() => {
                progressInline.classList.add('hidden');
                stepList.classList.add('hidden');
            }, success ? 2000 : 4000);
        }

        function populateSteps(steps) {
            stepList.classList.remove('hidden');
            stepList.innerHTML = '';
            steps.forEach((step) => {
                const recog = step.recognition || {};
                const ok = recog.success;

                const item = document.createElement('div');
                item.className = 'step-item ' + (ok ? 'step-ok' : 'step-fail');
                item.innerHTML = `
                    <div class="step-summary">
                        <span class="step-icon">${ok ? '✓' : '✗'}</span>
                        <span class="step-name">${escapeHtml(step.step_name || '')}</span>
                        ${ok ? `<span class="step-backend">${recog.scheme || ''}</span>` : ''}
                    </div>
                    <div class="step-detail">
                        ${step.image_base64 ? `<img src="${step.image_base64}" class="step-thumb" alt="">` : ''}
                        <div class="step-backends">
                            ${(recog.all_results || []).map(r =>
                                `<span class="backend-result ${r.success ? 'ok' : 'fail'}">${r.scheme} ${r.success ? '✓' : '✗'}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
                item.querySelector('.step-summary').addEventListener('click', () => {
                    item.classList.toggle('expanded');
                });
                stepList.appendChild(item);
            });
        }

        async function processFile(record) {
            const resp = await fetch('/api/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: record.filename }),
                signal: abortController.signal,
            });
            const data = await resp.json();
            if (!data.success) {
                throw new Error(data.error || '未能识别到QR码内容');
            }
            if (data.qr_regions && data.qr_regions.length > 0) {
                record.regions = data.qr_regions;
            }
            record.results = data;
            record.processed = true;
            return data;
        }

        async function startProcessing() {
            const activeFile = getActiveFile();
            if (!activeFile || !activeFile.filename) return;

            processing = true;
            abortController = new AbortController();
            errorSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            cancelCropMode();
            cropHint.classList.add('hidden');
            btnProcess.textContent = '取消处理';
            btnProcess.classList.add('btn-cancel');
            btnProcessAll.classList.add('hidden');
            startProgress();

            try {
                const data = await processFile(activeFile);
                finishProgress(true);
                populateSteps(data.steps || []);
                renderAllResults();
            } catch (err) {
                if (err.name === 'AbortError') return;
                finishProgress(false);
                showError(err.message || '处理失败，请检查网络连接后重试');
            } finally {
                processing = false;
                abortController = null;
                btnProcess.textContent = '开始处理';
                btnProcess.classList.remove('btn-cancel');
                updateUI();
            }
        }

        async function startProcessingAll() {
            const toProcess = [];
            uploadedFiles.forEach((record) => {
                if (record.filename && !record.processed) toProcess.push(record);
            });
            if (toProcess.length === 0) return;

            processing = true;
            abortController = new AbortController();
            errorSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            cancelCropMode();
            cropHint.classList.add('hidden');
            btnProcess.classList.add('hidden');
            btnProcessAll.textContent = '取消处理';
            btnProcessAll.classList.add('btn-cancel');
            btnProcessAll.classList.remove('hidden');
            startProgress();

            let completed = 0;
            const total = toProcess.length;
            let anySuccess = false;

            for (const record of toProcess) {
                try {
                    const data = await processFile(record);
                    anySuccess = true;
                    completed++;
                    progressText.textContent = `处理中 (${completed}/${total})`;
                    populateSteps(data.steps || []);
                    renderAllResults();
                } catch (err) {
                    if (err.name === 'AbortError') return;
                    completed++;
                    progressText.textContent = `处理中 (${completed}/${total})`;
                }
            }

            finishProgress(anySuccess, anySuccess ? `全部完成 (${completed}/${total})` : '所有文件均未能识别到QR码');
            if (!anySuccess) {
                showError('所有文件均未能识别到QR码');
            }
            renderAllResults();

            processing = false;
            abortController = null;
            btnProcessAll.textContent = '处理全部';
            btnProcessAll.classList.remove('btn-cancel');
            btnProcess.classList.remove('hidden');
            updateUI();
        }

        function abortProcessing() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            clearInterval(progressTimer);
            progressTimer = null;
            processing = false;
            progressInline.classList.add('hidden');
            stepList.classList.add('hidden');
            btnProcess.textContent = '开始处理';
            btnProcess.classList.remove('btn-cancel');
            btnProcessAll.textContent = '处理全部';
            btnProcessAll.classList.remove('btn-cancel');
        }

        // ============================================================
        // Results rendering
        // ============================================================
        function renderAllResults() {
            const processedFiles = [];
            uploadedFiles.forEach((record, id) => {
                if (record.processed && record.results) processedFiles.push({ id, record });
            });

            if (processedFiles.length === 0) return;

            resultsSection.classList.remove('hidden');

            // Render sidebar file list
            let totalResults = 0;
            resultsSidebar.innerHTML = '';

            processedFiles.forEach(({ id, record }) => {
                const dedup = record.results.deduplicated || [];
                totalResults += dedup.length;

                const item = document.createElement('div');
                item.className = 'results-file-item' + (id === activeResultTabId ? ' active' : '');
                const badgeClass = dedup.length > 0 ? 'ok' : 'empty';
                const badgeText = dedup.length > 0 ? `${dedup.length}` : '—';
                item.innerHTML = `
                    <span class="results-file-name">${escapeHtml(record.originalName)}</span>
                    <span class="results-file-badge ${badgeClass}">${badgeText}</span>
                `;
                item.addEventListener('click', () => {
                    if (processing) return;
                    activeResultTabId = id;
                    renderAllResults();
                });
                resultsSidebar.appendChild(item);
            });

            // Set default active file
            if (!activeResultTabId || !uploadedFiles.has(activeResultTabId) || !uploadedFiles.get(activeResultTabId).processed) {
                const firstWithResults = processedFiles.find(p => (p.record.results.deduplicated || []).length > 0);
                activeResultTabId = firstWithResults ? firstWithResults.id : processedFiles[0].id;
                renderAllResults();
                return;
            }

            resultsTitle.textContent = totalResults > 0 ? `处理结果（${processedFiles.length} 张图，共 ${totalResults} 条）` : '处理结果';

            // Render active file's results
            const activeRecord = uploadedFiles.get(activeResultTabId);
            if (!activeRecord) return;

            resultsGroups.innerHTML = '';
            renderOneFileResults(activeResultTabId, activeRecord);
            bindResultEvents();
        }

        function renderOneFileResults(id, record) {
            const dedup = record.results.deduplicated || [];
            const group = document.createElement('div');
            group.className = 'result-group';

            if (dedup.length === 0) {
                group.innerHTML = `
                    <div class="group-header">
                        <span class="group-name">${escapeHtml(record.originalName)}</span>
                        <span class="group-count">未识别到QR码</span>
                    </div>
                    <div class="no-results-inline">
                        <p>未能识别到QR码内容</p>
                        <button class="btn btn-secondary btn-small retry-crop-btn" data-file-id="${id}">手动框选QR区域</button>
                    </div>
                `;
                resultsGroups.appendChild(group);
                return;
            }

            const hasRegions = record.regions && record.regions.length > 0;
            const data = record.results;

            let cardsHTML = '';
            dedup.forEach((entry, idx) => {
                let detailsHTML = '';
                if (hasRegions) {
                    detailsHTML = `
                        <details class="card-details">
                            <summary>查看原图与检测区域</summary>
                            <div class="details-images">
                                <div class="detail-thumb">
                                    <img src="${data.original_image_base64}" alt="原图">
                                    <span>原图</span>
                                </div>
                                <div class="detail-thumb">
                                    <img src="${record.regions[0].crop_base64}" alt="检测区域">
                                    <span>检测到的QR区域</span>
                                </div>
                            </div>
                        </details>`;
                } else {
                    detailsHTML = `
                        <details class="card-details">
                            <summary>查看原图</summary>
                            <div class="details-images">
                                <div class="detail-thumb">
                                    <img src="${data.original_image_base64}" alt="原图">
                                    <span>原图</span>
                                </div>
                            </div>
                        </details>`;
                }

                const isUrl = /^https?:\/\//i.test(entry.content);
                const contentDisplay = isUrl
                    ? `<span class="content-icon">🔗</span><span class="content-text">${escapeHtml(entry.content)}</span>`
                    : escapeHtml(entry.content);

                cardsHTML += `
                    <div class="result-card animate-in" style="animation-delay:${idx * 0.08}s">
                        <div class="card-body">
                            <div class="card-hero">
                                <img src="${entry.reconstructed_qr_base64}" alt="重建QR码" class="hero-qr" title="点击放大">
                                <span class="hero-label">已重建 · 可直接扫描</span>
                            </div>
                            <div class="card-content-section">
                                <div class="content-block ${isUrl ? 'is-url' : ''}">
                                    ${contentDisplay}
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-copy" data-content="${escapeHtml(entry.content)}">复制内容</button>
                                <button class="btn btn-download" data-qr="${entry.reconstructed_qr_base64}">下载QR码</button>
                            </div>
                            ${detailsHTML}
                        </div>
                    </div>
                `;
            });

            group.innerHTML = `
                <div class="group-header">
                    <span class="group-name">${escapeHtml(record.originalName)}</span>
                    <span class="group-count">${dedup.length} 个结果</span>
                </div>
                <div class="group-cards">${cardsHTML}</div>
                <div class="group-actions">
                    <button class="btn btn-small btn-download-all" data-file-id="${id}">下载全部QR码</button>
                    <button class="btn btn-small btn-copy-all" data-file-id="${id}">复制全部内容</button>
                </div>
            `;
            resultsGroups.appendChild(group);
        }

        function bindResultEvents() {
            // Copy buttons
            resultsGroups.querySelectorAll('.btn-copy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const content = btn.getAttribute('data-content');
                    navigator.clipboard.writeText(content).then(() => {
                        btn.textContent = '已复制';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.textContent = '复制内容';
                            btn.classList.remove('copied');
                        }, 2000);
                    }).catch(() => alert('复制失败，请手动复制'));
                });
            });

            // Download buttons
            resultsGroups.querySelectorAll('.btn-download').forEach(btn => {
                btn.addEventListener('click', () => {
                    downloadDataUri(btn.getAttribute('data-qr'), `qr-code-${Date.now()}.png`);
                });
            });

            // Copy all for a group
            resultsGroups.querySelectorAll('.btn-copy-all').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fileId = btn.getAttribute('data-file-id');
                    const record = uploadedFiles.get(fileId);
                    if (!record || !record.results) return;
                    const contents = (record.results.deduplicated || [])
                        .map(e => e.content).join('\n');
                    navigator.clipboard.writeText(contents).then(() => {
                        btn.textContent = '已复制全部';
                        setTimeout(() => { btn.textContent = '复制全部内容'; }, 2000);
                    }).catch(() => alert('复制失败'));
                });
            });

            // Download all for a group
            resultsGroups.querySelectorAll('.btn-download-all').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fileId = btn.getAttribute('data-file-id');
                    const record = uploadedFiles.get(fileId);
                    if (!record || !record.results) return;
                    const entries = record.results.deduplicated || [];
                    entries.forEach((entry, i) => {
                        setTimeout(() => {
                            downloadDataUri(entry.reconstructed_qr_base64, `qr-${i + 1}.png`);
                        }, i * 300);
                    });
                    btn.textContent = `已下载 ${entries.length} 个`;
                    setTimeout(() => { btn.textContent = '下载全部QR码'; }, 2000);
                });
            });

            // QR lightbox
            resultsGroups.querySelectorAll('.hero-qr').forEach(img => {
                img.addEventListener('click', () => {
                    lightboxImage.src = img.src;
                    const card = img.closest('.result-card');
                    const contentBlock = card ? card.querySelector('.content-block') : null;
                    lightboxInfo.innerHTML = contentBlock ? contentBlock.innerHTML : '';
                    qrLightbox.classList.remove('hidden');
                });
            });

            // Retry crop
            resultsGroups.querySelectorAll('.retry-crop-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fileId = btn.getAttribute('data-file-id');
                    activeFileId = fileId;
                    const record = uploadedFiles.get(fileId);
                    if (record) record.processed = false;
                    resultsSection.classList.add('hidden');
                    updateUI();
                    cropHint.classList.remove('hidden');
                    btnStartCrop.classList.remove('hidden');
                    startCropMode();
                });
            });
        }

        function downloadDataUri(dataUri, filename) {
            const link = document.createElement('a');
            link.href = dataUri;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Preview image zoom
        previewImage.addEventListener('click', () => {
            if (cropState.active || cropState.rects.length > 0) return;
            const activeFile = getActiveFile();
            if (!activeFile) return;
            lightboxContent.classList.add('preview-zoom');
            lightboxImage.src = activeFile.dataUri;
            lightboxInfo.innerHTML = '';
            qrLightbox.classList.remove('hidden');
        });

        // Lightbox
        lightboxBackdrop.addEventListener('click', closeLightbox);
        lightboxClose.addEventListener('click', closeLightbox);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        function closeLightbox() {
            qrLightbox.classList.add('hidden');
            lightboxContent.classList.remove('preview-zoom');
        }

        // ============================================================
        // Manual crop
        // ============================================================
        btnStartCrop.addEventListener('click', () => {
            if (!getActiveFile()) return;
            startCropMode();
        });
        btnCancelCrop.addEventListener('click', cancelCropMode);
        btnConfirmCrop.addEventListener('click', confirmCrop);

        btnManualProcess.addEventListener('click', () => {
            if (!getActiveFile() || cropState.rects.length === 0) return;
            processManualCrop();
        });

        function startCropMode() {
            cropState.active = true;
            cropState.drawing = false;
            cropState.dragging = false;
            cropState.resizing = false;
            cropState.selectedIndex = -1;
            cropState.rects = [];
            cropState.startX = cropState.startY = cropState.endX = cropState.endY = 0;

            btnStartCrop.classList.add('hidden');
            btnProcess.classList.add('hidden');
            btnProcessAll.classList.add('hidden');
            btnManualProcess.classList.add('hidden');
            btnConfirmCrop.classList.add('hidden');
            btnCancelCrop.classList.remove('hidden');

            previewImage.classList.add('crop-zoomed');
            previewImage.style.cursor = 'crosshair';

            clearAllCropOverlays();
            previewWrapper.addEventListener('mousedown', onCropMouseDown);
        }

        function cancelCropMode() {
            cropState.active = false;
            cropState.drawing = false;
            cropState.dragging = false;
            cropState.resizing = false;
            cropState.selectedIndex = -1;
            cropState.rects = [];
            cropState.startX = cropState.startY = cropState.endX = cropState.endY = 0;

            btnProcess.classList.remove('hidden');
            btnManualProcess.classList.add('hidden');
            btnConfirmCrop.classList.add('hidden');
            btnCancelCrop.classList.add('hidden');
            cropHint.classList.add('hidden');

            previewImage.classList.remove('crop-zoomed');
            previewImage.style.cursor = '';

            clearAllCropOverlays();
            previewWrapper.removeEventListener('mousedown', onCropMouseDown);
            document.removeEventListener('mousemove', onCropMouseMove);
            document.removeEventListener('mouseup', onCropMouseUp);
            updateUI();
        }

        function confirmCrop() {
            if (cropState.rects.length === 0) return;

            cropState.active = false;
            cropState.drawing = false;
            cropState.dragging = false;
            cropState.resizing = false;
            cropState.selectedIndex = -1;

            previewImage.classList.remove('crop-zoomed');
            previewImage.style.cursor = '';

            btnConfirmCrop.classList.add('hidden');
            btnCancelCrop.classList.add('hidden');
            btnManualProcess.classList.remove('hidden');
            btnManualProcess.textContent = `处理选中区域 (${cropState.rects.length})`;
            btnProcess.classList.remove('hidden');

            previewWrapper.removeEventListener('mousedown', onCropMouseDown);
            document.removeEventListener('mousemove', onCropMouseMove);
            document.removeEventListener('mouseup', onCropMouseUp);
            renderAllCropOverlays();
        }

        function getCropDisplayRect() {
            const bx = Math.min(cropState.startX, cropState.endX);
            const by = Math.min(cropState.startY, cropState.endY);
            const bw = Math.abs(cropState.endX - cropState.startX);
            const bh = Math.abs(cropState.endY - cropState.startY);
            return { bx, by, bw, bh };
        }

        function syncOrigForRect(rect) {
            const imgRect = previewImage.getBoundingClientRect();
            const scaleX = previewImage.naturalWidth / imgRect.width;
            const scaleY = previewImage.naturalHeight / imgRect.height;
            const bx = Math.min(rect.startX, rect.endX);
            const by = Math.min(rect.startY, rect.endY);
            const bw = Math.abs(rect.endX - rect.startX);
            const bh = Math.abs(rect.endY - rect.startY);
            rect.startX = bx;
            rect.startY = by;
            rect.endX = bx + bw;
            rect.endY = by + bh;
            rect.origX = Math.round(bx * scaleX);
            rect.origY = Math.round(by * scaleY);
            rect.origW = Math.round(bw * scaleX);
            rect.origH = Math.round(bh * scaleY);
        }

        function clearAllCropOverlays() {
            cropOverlays.innerHTML = '';
        }

        function renderAllCropOverlays() {
            cropOverlays.innerHTML = '';
            const imgLeft = previewImage.offsetLeft;
            const imgTop = previewImage.offsetTop;

            // Render confirmed rects
            cropState.rects.forEach((rect, i) => {
                const bx = Math.min(rect.startX, rect.endX);
                const by = Math.min(rect.startY, rect.endY);
                const bw = Math.abs(rect.endX - rect.startX);
                const bh = Math.abs(rect.endY - rect.startY);
                const isSelected = i === cropState.selectedIndex && cropState.active;

                const overlay = document.createElement('div');
                overlay.className = 'crop-overlay has-handles' + (isSelected ? ' selected' : '');
                overlay.dataset.rectIndex = i;
                overlay.style.left = (imgLeft + bx) + 'px';
                overlay.style.top = (imgTop + by) + 'px';
                overlay.style.width = bw + 'px';
                overlay.style.height = bh + 'px';

                if (isSelected) {
                    ['nw','n','ne','e','se','s','sw','w'].forEach(h => {
                        const handle = document.createElement('div');
                        handle.className = 'crop-handle ' + h;
                        handle.dataset.handle = h;
                        overlay.appendChild(handle);
                    });
                }

                const label = document.createElement('div');
                label.className = 'crop-size-label';
                label.textContent = `${rect.origW}×${rect.origH} px`;
                overlay.appendChild(label);

                const badge = document.createElement('div');
                badge.className = 'crop-rect-index';
                badge.textContent = i + 1;
                overlay.appendChild(badge);

                cropOverlays.appendChild(overlay);
            });

            // Render drawing overlay
            if (cropState.drawing) {
                const bx = Math.min(cropState.startX, cropState.endX);
                const by = Math.min(cropState.startY, cropState.endY);
                const bw = Math.abs(cropState.endX - cropState.startX);
                const bh = Math.abs(cropState.endY - cropState.startY);

                if (bw >= 2 && bh >= 2) {
                    const overlay = document.createElement('div');
                    overlay.className = 'crop-overlay';
                    overlay.style.left = (imgLeft + bx) + 'px';
                    overlay.style.top = (imgTop + by) + 'px';
                    overlay.style.width = bw + 'px';
                    overlay.style.height = bh + 'px';
                    cropOverlays.appendChild(overlay);
                }
            }
        }

        function onCropMouseDown(e) {
            if (!cropState.active) return;

            const imgRect = previewImage.getBoundingClientRect();
            const mx = e.clientX - imgRect.left;
            const my = e.clientY - imgRect.top;

            // Check handle first (resize)
            const handle = e.target.closest('.crop-handle');
            if (handle && cropState.selectedIndex >= 0) {
                e.preventDefault();
                cropState.resizing = true;
                cropState.resizeHandle = handle.dataset.handle;
                document.addEventListener('mousemove', onCropMouseMove);
                document.addEventListener('mouseup', onCropMouseUp);
                return;
            }

            // Check if clicking on an existing rect overlay (select or drag)
            const overlayEl = e.target.closest('.crop-overlay');
            if (overlayEl && overlayEl.dataset.rectIndex !== undefined) {
                const idx = parseInt(overlayEl.dataset.rectIndex);
                cropState.selectedIndex = idx;
                cropState.drawing = false;
                renderAllCropOverlays();

                const sel = cropState.rects[idx];
                const bx = Math.min(sel.startX, sel.endX);
                const by = Math.min(sel.startY, sel.endY);
                const bw = Math.abs(sel.endX - sel.startX);
                const bh = Math.abs(sel.endY - sel.startY);

                if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
                    e.preventDefault();
                    cropState.dragging = true;
                    cropState.dragOffX = mx - bx;
                    cropState.dragOffY = my - by;
                    document.addEventListener('mousemove', onCropMouseMove);
                    document.addEventListener('mouseup', onCropMouseUp);
                }
                return;
            }

            // Start new draw
            e.preventDefault();
            cropState.drawing = true;
            cropState.dragging = false;
            cropState.resizing = false;
            cropState.selectedIndex = -1;
            renderAllCropOverlays();

            cropState.startX = mx;
            cropState.startY = my;
            cropState.endX = mx;
            cropState.endY = my;

            document.addEventListener('mousemove', onCropMouseMove);
            document.addEventListener('mouseup', onCropMouseUp);
        }

        function onCropMouseMove(e) {
            const imgRect = previewImage.getBoundingClientRect();
            const mx = Math.max(0, Math.min(e.clientX - imgRect.left, imgRect.width));
            const my = Math.max(0, Math.min(e.clientY - imgRect.top, imgRect.height));

            if (cropState.drawing) {
                cropState.endX = mx;
                cropState.endY = my;
                renderAllCropOverlays();
                return;
            }

            if (cropState.resizing && cropState.selectedIndex >= 0) {
                const sel = cropState.rects[cropState.selectedIndex];
                const h = cropState.resizeHandle;
                if (h.includes('e')) sel.endX = mx;
                if (h.includes('w')) sel.startX = mx;
                if (h.includes('s')) sel.endY = my;
                if (h.includes('n')) sel.startY = my;

                if (sel.endX - sel.startX < 10) {
                    if (h.includes('e')) sel.endX = sel.startX + 10;
                    else if (h.includes('w')) sel.startX = sel.endX - 10;
                }
                if (sel.endY - sel.startY < 10) {
                    if (h.includes('s')) sel.endY = sel.startY + 10;
                    else if (h.includes('n')) sel.startY = sel.endY - 10;
                }

                sel.startX = Math.max(0, sel.startX);
                sel.startY = Math.max(0, sel.startY);
                sel.endX = Math.min(imgRect.width, sel.endX);
                sel.endY = Math.min(imgRect.height, sel.endY);

                syncOrigForRect(sel);
                renderAllCropOverlays();
                return;
            }

            if (cropState.dragging && cropState.selectedIndex >= 0) {
                const sel = cropState.rects[cropState.selectedIndex];
                const bw = Math.abs(sel.endX - sel.startX);
                const bh = Math.abs(sel.endY - sel.startY);
                let newX = mx - cropState.dragOffX;
                let newY = my - cropState.dragOffY;
                newX = Math.max(0, Math.min(newX, imgRect.width - bw));
                newY = Math.max(0, Math.min(newY, imgRect.height - bh));

                sel.startX = newX;
                sel.startY = newY;
                sel.endX = newX + bw;
                sel.endY = newY + bh;

                syncOrigForRect(sel);
                renderAllCropOverlays();
                return;
            }
        }

        function onCropMouseUp(e) {
            document.removeEventListener('mousemove', onCropMouseMove);
            document.removeEventListener('mouseup', onCropMouseUp);

            if (cropState.drawing) {
                cropState.drawing = false;
                const bw = Math.abs(cropState.endX - cropState.startX);
                const bh = Math.abs(cropState.endY - cropState.startY);

                if (bw > 5 && bh > 5) {
                    const newRect = {
                        startX: cropState.startX,
                        startY: cropState.startY,
                        endX: cropState.endX,
                        endY: cropState.endY,
                        origX: 0, origY: 0, origW: 0, origH: 0,
                    };
                    syncOrigForRect(newRect);
                    if (newRect.origW > 5 && newRect.origH > 5) {
                        cropState.selectedIndex = cropState.rects.length;
                        cropState.rects.push(newRect);
                        btnConfirmCrop.classList.remove('hidden');
                    }
                }
                renderAllCropOverlays();
                return;
            }

            if (cropState.resizing || cropState.dragging) {
                cropState.resizing = false;
                cropState.dragging = false;
                if (cropState.selectedIndex >= 0) {
                    syncOrigForRect(cropState.rects[cropState.selectedIndex]);
                }
                renderAllCropOverlays();
                return;
            }
        }

        // Keyboard: Delete/Backspace to remove selected rect, Esc to clear or cancel crop
        document.addEventListener('keydown', (e) => {
            if (!cropState.active || !qrLightbox.classList.contains('hidden')) return;

            if ((e.key === 'Delete' || e.key === 'Backspace') && cropState.selectedIndex >= 0) {
                e.preventDefault();
                cropState.rects.splice(cropState.selectedIndex, 1);
                cropState.selectedIndex = cropState.rects.length > 0 ? Math.min(cropState.selectedIndex, cropState.rects.length - 1) : -1;
                if (cropState.rects.length === 0) btnConfirmCrop.classList.add('hidden');
                renderAllCropOverlays();
            } else if (e.key === 'Escape') {
                if (cropState.rects.length > 0) {
                    cropState.rects = [];
                    cropState.selectedIndex = -1;
                    btnConfirmCrop.classList.add('hidden');
                    renderAllCropOverlays();
                } else {
                    cancelCropMode();
                }
            }
        });

        // ============================================================
        // Manual crop processing
        // ============================================================
        async function processManualCrop() {
            const activeFile = getActiveFile();
            if (!activeFile || !activeFile.filename || cropState.rects.length === 0) return;

            const rects = cropState.rects.map(r => ({ x: r.origX, y: r.origY, width: r.origW, height: r.origH }));

            processing = true;
            abortController = new AbortController();
            btnManualProcess.disabled = true;
            btnProcess.classList.add('hidden');
            btnCancelCrop.classList.add('hidden');
            errorSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            clearAllCropOverlays();
            cropHint.classList.add('hidden');
            startProgress();

            try {
                let allSteps = [];
                let allRegions = [];
                let anySuccess = false;
                let lastError = null;

                for (let i = 0; i < rects.length; i++) {
                    const r = rects[i];
                    progressText.textContent = `处理框选区域 (${i + 1}/${rects.length})...`;
                    try {
                        const resp = await fetch('/api/manual_crop', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                filename: activeFile.filename,
                                x: r.x, y: r.y, width: r.width, height: r.height,
                            }),
                            signal: abortController.signal,
                        });
                        const data = await resp.json();
                        if (data.success) {
                            anySuccess = true;
                            if (data.steps) allSteps = allSteps.concat(data.steps);
                            if (data.qr_regions) allRegions = allRegions.concat(data.qr_regions);
                            if (data.deduplicated) {
                                if (!activeFile.results) {
                                    activeFile.results = data;
                                } else {
                                    const existing = activeFile.results.deduplicated || [];
                                    const merged = new Map();
                                    existing.forEach(d => merged.set(d.content, d));
                                    (data.deduplicated || []).forEach(d => { if (!merged.has(d.content)) merged.set(d.content, d); });
                                    activeFile.results.deduplicated = Array.from(merged.values());
                                    activeFile.results.dedup_count = activeFile.results.deduplicated.length;
                                }
                            }
                        } else {
                            lastError = data.error;
                        }
                    } catch (err) {
                        if (err.name === 'AbortError') return;
                        lastError = err.message;
                    }
                }

                if (anySuccess) {
                    if (allRegions.length > 0) activeFile.regions = allRegions;
                    activeFile.processed = true;
                    finishProgress(true);
                    populateSteps(allSteps);
                    renderAllResults();
                } else {
                    finishProgress(false);
                    showError(lastError || '未能识别到QR码内容');
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                finishProgress(false);
                showError('处理失败，请检查网络连接后重试');
            } finally {
                processing = false;
                abortController = null;
                btnManualProcess.disabled = false;
                btnProcess.classList.remove('hidden');
                cropState.rects = [];
                updateUI();
            }
        }

        // ============================================================
        // Utilities
        // ============================================================
        function showError(msg) {
            errorSection.classList.remove('hidden');
            errorMessage.textContent = msg;
        }

        function clearError() {
            errorSection.classList.add('hidden');
            errorMessage.textContent = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    })();
    </script>
</body>
</html>
